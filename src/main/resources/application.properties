spring.application.name=PIDEV
# XAMPP MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/PIDEV?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&maxAllowedPacket=67108864
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwtSecret=mySecretKeyForJWTGenerationShouldBeLongEnoughForHS512
app.jwtExpirationMs=90000
app.jwtRefreshThresholdMs=30000

server.port=8081

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (Gmail SMTP)
# For Gmail: Enable "Less secure app access" or use App Password
