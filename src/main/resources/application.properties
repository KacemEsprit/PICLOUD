# Application Configuration
app.frontend.url=http://localhost:4200
app.password.reset.token.expiry.hours=24

# Legal Document Management Configuration
app.file.upload.dir=C:/xampp/htdocs/pidev-uploads
app.file.max-size=10485760

# Spring Web Resources Configuration - Serve static files from htdocs
# Allows direct HTTP access to files: http://localhost:8081/pidev-uploads/1/filename.pdf
spring.web.resources.static-locations=file:C:/xampp/htdocs/pidev-uploads/
spring.web.resources.cache.period=3600
spring.web.resources.cache.cachecontrol.max-age=3600

# Scheduled Jobs Configuration (Cron expressions)
# Daily at 00:00 (midnight) - check for expired documents
app.scheduled.expiry-check.cron=0 0 0 * * *
# Daily at 10:00 (10 AM) - send expiry notifications
app.scheduled.expiry-notification.cron=0 0 10 * * *
# Daily at 01:00 (1 AM) - cleanup old audit logs (by default older than 7 days)
app.scheduled.audit-log-cleanup.cron=0 0 1 * * *

# Audit Log Configuration
# Number of days to retain audit logs before automatic deletion (default: 7 days)
app.audit-log.retention-days=7

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs


